<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký thành viên</title>
    <style>
        body {
            font-family: Arial;
            background: #d1e3ff;
        }
        .form-box {
            width: 450px;
            margin: 40px auto;
            background: #fff;
            padding: 25px 35px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .btn-box {
            text-align: center;
        }
        button {
            width: 120px;
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background: #2196F3;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.8;
        }
        .btn-cancel {
            background: #4CAF50;
        }
    </style>
</head>
<body>

<div class="form-box">
    <h2>ĐĂNG KÝ THÀNH VIÊN</h2>

    <form action="xuly.php" method="post">

        <label>Họ và tên *</label>
        <input type="text" name="hoten" required>

        <label>Giới tính</label>
        <select name="gioitinh">
            <option>Nam</option>
            <option>Nữ</option>
            <option>Khác</option>
        </select>

        <label>Ngày sinh</label>
        <input type="date" name="ngaysinh">

        <label>Email *</label>
        <input type="email" name="email" required>

        <label>Tên đăng nhập *</label>
        <input type="text" name="username" required>

        <label>Mật khẩu *</label>
        <input type="password" name="password" required>

        <label>Nhập lại mật khẩu *</label>
        <input type="password" name="repassword" required>

        <div class="btn-box">
            <button type="submit">Đăng ký</button>
            <button type="reset" class="btn-cancel">Bỏ qua</button>
        </div>
    </form>
</div>

</body>
</html>
